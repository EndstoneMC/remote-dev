services:
  remote-dev:
    container_name: endstone-remote-dev
    image: endstone/remote-dev
    build:
      context: .
    restart: unless-stopped
    ports:
      # Exposed on all interfaces for LAN access. If you do not need LAN access,
      # bind to localhost instead (e.g. '127.0.0.1:22:22') — the default password
      # makes LAN exposure risky on shared networks. See README for details.
      - '22:22'
      - '19132:19132/udp'
    volumes:
      # Host ~/.ssh is mounted read-only at /mnt/host-ssh; the container's
      # entrypoint copies it into /home/endstone/.ssh with the strict perms
      # OpenSSH requires (Docker bind mounts on Windows/macOS otherwise yield
      # modes OpenSSH refuses, e.g. for ~/.ssh/config).
      - '~/.ssh/:/mnt/host-ssh/:ro'
      - 'conan-cache:/home/endstone/.conan2'

volumes:
  conan-cache:
